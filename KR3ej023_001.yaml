body:
  text: 卷上脈法凡孩子三歲以下呼為純陽元氣未散若有脈候即須於一寸取之不得同大人分寸其脈候未來呼之脈來三至吸之脈來三至呼吸定息一至此為無患矣所言定息呼氣未出吸氣未入定息之中又至此是和平也若以大人脈五至取之即差矣如此七至以上即為有氣或脈浮如弓之張弦此為有風並可依後方合藥治之或七至以下此為冷候亦宜依後方合藥療之或診候取平或忽而不見沉浮不定伏益根平者此為神鬼之病且合求祟續宜使藥或桃柳枝湯浴煎飲子為使一兩顆桃心孩子脈呼吸十五至以上三至以下皆死矣病證初生小兒鵝口撮噤並是出胎客風著顱臍致有此可以小艾灸三壯及烙之愈初生小兒至夜啼者是有瘀血腹痛夜乘陰而痛則啼初生小兒一月內乳利如膠是母寒氣傷胃所致也初生小兒一月內乳利如血是母胸有滯熱所作也初生小兒一月內兩眼赤者是在胎之時母吃炙煿熱面壅滯氣入胎中熏兒腦所致也小兒溫熱皆因從氣熱而搏胃氣使然下之氣平即愈氣虛則生驚而變癇小兒驚癇一從虛邪客氣相搏而生其候當用補養安和即愈加以性冷及太過即死小兒噦逆吐皆胃氣虛逆氣客於臟氣而作當和胃養氣如至下冷極即小兒霍亂吐逆皆胃氣與陰陽氣上下交爭而作當用安和補藥調養即愈小兒客忤無辜皆因客入所觸及暴露星月小兒嫩弱所以此候多惡小兒一眼青揉癢是肝疳二齒焦是骨疳三肉色鼻中干是肺疳四皮乾肉裂是筋疳五發焦黃是血疳六舌上生瘡是心疳七愛吃泥土是脾疳孩子肌骨肥實皮膚白無故煩渴此自小奶猛衝損肺但依後方內用甘草人參合飲子若氣急甚胸脹起鼻連眼下瞼青色呻吟之聲者此必死之兆不得與藥孩子痢如疳靛者難效痢如鵝鴨血者脾已爛損不宜與藥孩子凡有諸色疾苦但瞼下垂牽必定死矣孩子瘧皆難效或發無時即口噤咬牙作聲此必死矣呼為歷瘠疳瘧亦名為鎖腸疳孩子無故搖頭此為腦頂風孩子渴吃乳食夜啼作聲此即是腹肚痛孩子吃乳皆出此是脾冷孩子無故肚大項細四肢消瘦筋脈骨節弛緩是小來少乳嚼食與吃早成骨熱疳勞先宜與保童丸吃續與柴胡鱉甲飲子保童丸方見一切疳門中柴胡飲子方見行遲門中孩子頭面胸膊肌厚臂脛細瘦行走遲者是小時抱損孩子鼻流清涕或鼻下赤癢此是腦中鼻中疳極宜用後方青黛散吹鼻兼敷下赤爛處方見疳疾吹鼻門中已前並診候孩子疾狀孩子氣脈未調臟腑脆薄腠理開疏看脈以時依方用藥孩子或夏中熱時因乳母沐浴多使冷水奶得冷氣血脈皆伏見孩子氣未定便與奶使孩子胃毒及赤白兩般惡痢此乃是奶母之過凡浴後可令定息良久候氣定揉與之即全無患師巫燒錢乳母須預祝之勿令著水噴兒皆令驚熱入心轉成患害切宜慎之凡孩子自生但任陰陽推移即每六十日一度變蒸此骨節長來四肢發熱或不下食乳遇如此之時上唇有珠之如粟粒大此呼為變蒸珠子以後方退熱飲子療之不宜別與方藥幼幼新書注云顱囟經以六十日為一變巢氏病源以三十二日為一變說有不同故兼存之驚癇癲證治牛黃丸治小兒胎驚及癇或心熱牛黃龍腦馬牙硝鐵焰粉各一分上為細末煉蜜丸如梧桐子大每日乳食前熱水調破一丸灌下令母忌口又牛黃丸治孩子驚熱入心疑成癇疾面色不定啼哭不出潮熱無度不吃乳食大睜眼翻露白手足逆冷呼喚不應牛黃研大黃獨活各一分升麻琥珀炙別研緑豆粉大麻仁別研各半兩上為細末蜜丸如梧桐子大空心熱水下一丸頓服之食後再服一丸至十歲加金銀箔各五片忌煿炙毒物虎睛丸治小兒風癇驚啼不吃乳虎睛一支犀角子芩各等分梔子仁大黃各十分上五味為細末煉蜜丸如梧桐子大驚啼不吃奶乳汁下七丸風癇米飲下五丸至七丸小兒減丸數取利為度忌毒物若有虛熱加知母六分又虎睛丸治小兒子二十四種驚癇壯熱抽掣腳手嘔吐夜啼眼腫虎睛一支聖惠用一對梔子仁茯苓各二分牛黃少許聖惠用半兩人參一分聖惠用一兩鉤藤大黃各四分犀角末一分聖惠用二兩黃芩一分聖惠用一兩蛇蛻七寸燒灰聖惠用一分上為末蜜丸如黍米大空心熱水下隨年丸輕者一服重者三服奶汁下亦得聖惠熱水下奶母忌一切生冷油膩毒物廣利方治孩子驚癇不知迷悶嚼舌仰目牛黃一大豆上為細末研和蜜水服之二十二味虎睛丸治孩子從一歲至大癲發無時口出白沫小便淋瀝不利虎睛一支生眼佳曝乾酒浸令黃色蚱蟬四枚去翅足炙珍珠蜂房各三錢麻黃鉤藤各三分鐵精防葵大黃子芩龍齒銀屑梔子仁羌活各四分柴胡升麻白鮮皮雷丸燒令赤人參各三分細辛一分半蛇皮五寸炙石膏五分上為末蜜丸如赤豆大四五歲五丸日再服大兒十丸濃煎米飲下忌生冷油膩疳痢證治保童丸治小兒孩子諸色疳候或腹內虛脹驚癇頭髮立常咬手指脊疳疳勞臂脛細弱行立不得及鼻下常赤清涕涎流不止舌上生瘡腦疳口疳腹上筋脈青虎睛半支硃砂麝香各一錢龍腦牛黃巴豆芎藭桔梗枳殼檀香蕉茯神人參當歸羌活代赭鶴蝨白朮各半兩上為細末下香砂巴豆令勻煉蜜丸如梧桐子大一歲至五歲每日一丸十歲每日三丸並空心米飲下但稍知孩子病甚即加藥與之孩子未效奶母忌生冷油膩炙煿毒魚大蒜米醋又方治孩子疳痢諸色疳並一十五病狀一腹大二皮膚黑黃三骨節粗四眼赤五口赤六鼻中生瘡七頭髮黃八咬指甲九愛吃土十愛吃甜物十一身熱十二頭大十三臍凸十四項細十五面無光並宜常服保童丸方硃砂半分牛黃麝香蟾酥各少許阿魏二分上先將硃砂於淨器中研如粉入諸藥一時以蒸餅為丸忌羊血生冷等又方治孩子疳氣或腹肚脹上筋脈頭大項細吃物不知足夜中即起腹內長鳴大黃一兩陳橘皮二兩酸醋二合浸兩日曬乾蜣螂二十個去翅足子熱燒醋安之以杯蓋地上去火毒候冷取出炒過上為末蜜丸如梧桐子大每日空心熱水下十丸忌如常紫雪丸方治小兒五疳兼腹肚虛脹疳氣煩悶或時燥渴大黃黃連代赭各二分硃砂麝香各少許杏仁去皮尖別研肉豆蔻巴豆去皮以冷水浸別研各一兩上為細末蜜丸如赤豆大每服空心米飲下一丸五歲十歲只可服五丸臨時加減忌生冷油膩炙煿硃砂丸治孩子疳痢辨蟲顏色定吉凶硃砂半石蓮大阿魏如硃砂大蝙蝠血三兩滴蟾酥少許上為細末和少許口脂調先以桃柳枝煎湯浴兒後看小兒大小以緑豆大填兒臍中後用紙片臍中貼之用青衣蓋兒看蟲出來黃色者輕青黑色重青黛散治孩子鼻流清涕或鼻下赤癢青黛一錢蘆薈地龍各半錢硃砂一字匕瓜蒂半錢細辛一錢宣連半錢上為細末和合吹鼻中入麝香少許保童丸硃砂麝香新蟾酥各等分上研合成劑合子內盛丸如麻子大又於一合子內浸一丸以箸頭點入鼻中亦名問命丸但孩子病甚即與吹之或得七噴可以治之五噴即甚三噴必死矣此不可深著水浸臨時入水亦不畏蓋腦散治孩子腦疳鼻癢毛髮作穗面色赤地榆炙蛤蟆燒各一分蝸牛殼二十一個青黛石蜜各二分麝香二大豆許上為末吹鼻當有黃水出忌甜物胡黃連丸治孩子熱疳胡黃連蟾酥各等分上為末蜜丸如緑豆大五歲熱水下二丸調中丸治孩子諸疳或熱攻衝心肺氣急晝夜有汗日漸羸瘦不吃乳食柴胡茯苓人參木香桂心大黃濕紙裹煨枳殼麩炒去皮瓤甘草炙鱉甲醋炙各等分上為末蜜丸如梧桐子大每歲兩丸至五歲三丸熱水下忌如常地黃煎方治孩子疳勞肺氣熱咳嗽四肢漸瘦心肺干生地黃汁五兩蟾酥生薑汁蜜各一兩鹿角膠半兩上先將地黃汁安鍋內慢火煎手不住攪約五六沸下酥又五六沸下蜜次下膠又下薑汁慢火煎候如稀餳即住火每食後兩度共與一匙頭忌毒物又方治孩子疳蝕口齒齒齦宣露臭穢不可近葶藶炒胡桐律等分上為末以臘月豬脂調微煎作膏取柳木箸子綿裹微微搵藥時烙又方治孩子疳蝕唇鼻及諸瘡硫黃乾漆文蛤上等分燒灰稍煙盡研為末入麝香少許以帛拭瘡膿後用藥乾摻之立效又方治孩子初患諸色痢及微有疳氣上用枳實不限多少炒令黑拗破看內外相似為散空心米飲下半錢以歲加減服之忌如常又方治孩子赤白痢阿膠赤石脂枳殼麩炒龍骨訶子炮半熱去核各半兩白朮一分上為末一歲二歲空心米飲下半錢又方治孩子冷毒疳痢白膿疳靛日加瘦弱不吃食腹痛青木香一分黃連半兩上為末蜜丸如梧桐子大一歲以上空心熱水下一丸三歲五歲服二丸藥性熱者不宜多服忌生冷溫脾散治孩子水瀉利並脾冷食乳不消吃奶頻吐附子乾薑甘草炮銼各半兩白朮一兩上為末空心米飲下半錢忌鮮魚毒物
