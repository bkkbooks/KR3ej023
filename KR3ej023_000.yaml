front:
  text: 原序夫顱囟者謂天地陰陽化感顱囟故受名也嘗覽黃帝內傳王母金文始演四序二儀陰陽之術三才一元之道採御靈機黃帝得之升天祕藏金匱名曰內經百姓莫可見之後穆王賢士師巫於崆洞山得而釋之敘天地大德陰陽化功父母交和中成胎質爰自精凝血室兒感陽興血入精宮女隨陰住故以清氣降而陽谷生濁氣升而陰井盛也甚者二儀互換五氣相參目睹元機非賢莫達謂真陰錯雜使精血聚而成殃陽發異端感榮衛合而有疾遂使嬰兒才養驚候多生庸愚不測始末亂施攻療便致枉損嬰兒籲哉籲哉遂究古言尋察端由敘成疾目曰顱囟經焉真憑辨證乃定死生後學之流審依濟疾天和太清降乘赤海真一元氣乘之則母情先搖蕩漾熾然是陽盛發陰當妊男也六脈諸經皆舉其陽證所謂妊衰不勝臟氣則觸忤而便傷妊勝而氣劣則母疾三五月而發皆隨五臟心臟干而口苦舌乾肺臟竭而多涕發寒肝臟邪而嗜酸多睡脾臟發而嘔逆惡食腎臟困而軟弱無力臟妊氣平則和而無苦胎若劣而強得臟養至生亦乃多疾二儀純陰之證升雜真一者謂陰發陽則父精薄妊當成女也六脈諸經皆發陰證若血盛氣衰則肥而劣氣若氣盛血衰則瘦而壯氣餘臟妊之氣皆同男説孩子處母腹之內時受化和之正氣分陰陽之紀綱天地降靈十月而化萬物以生成隨其時變大理清純化成祥瑞之基全真道一故生成焉一月為胚精血凝也二月為胎形兆分也三月陽神為三魂動以生也四月陰靈為七魄靜鎮形也五月五行分臟安神也六月六律定腑滋靈也七月精開竅通光明也八月元神俱降真靈也九月宮室羅布以生人也十月氣足萬物成也太乙元真在頭曰泥丸總衆神也得諸百靈以御邪氣陶甄萬物以靜為源是知慎子調護即以守恬和可以保長生耳故小兒瘦疴蓋他人之過也
