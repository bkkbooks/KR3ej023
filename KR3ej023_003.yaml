body:
  text: 卷下火丹證治黃帝問岐伯曰後生少稚多被惡疾丹毒二品若何分之岐伯曰陽解百年一十以上為毒一十以下為丹丹毒一也隨其大小分別以治之有毒至依方萬無一差喻人間男女皆遭丹毒至依此枉死者復何限哉良由信邪師之語仍被恐之愚昧之人勿與下手請依方用之今出此圖形狀如後伊火丹從兩脅起神灶丹從肚起尿灶丹從踝起胡吹灶丹從陰囊上起天火丹從腹背遍身起天雷丹從頭頂起煉火丹從背甲起方闕胡漏灶丹從臍中起廢灶丹從曲臂起神氣丹從頭項上起土灶丹從陰踝起朱黃丹赤豆色遍身上起螢火丹從耳起野灶丹從背脊起鬼火丹從面上起伊火丹從兩脅起上用豬糞燒灰並鐵糟中泥拌調塗之日三神灶丹從肚起上用土蜂窠杏仁膩粉生油調塗立瘥尿灶丹從肚起上用屋四角頭茅草燒灰使雞子白調塗之胡吹灶丹從陰囊上起上用水茄窠下泥和苦酒塗之天火丹從腹背遍身起上用樺皮白末和生油調塗之亦用赤石脂調塗天雷丹從頭頂起上用陰乾蔥末拌赤石脂塗又用灶下土雞子白調塗胡漏灶丹從臍中起上用屋漏水調灶中土塗之廢灶丹從曲臂起上用屋四角茅草燒灰雞子白調塗之神氣丹從頭背上起上用牯牛骨燒灰羊脂塗之土灶丹從陰踝起上用屋四角茅草灶橫麻及雞子白調塗之朱黃丹赤豆色遍身上起上用慎火草搗汁和酒調塗之螢火丹從耳起上用慎火草搗汁塗之聖惠以醋調塗野灶丹從背脊起上用柔香茸蒴草豨赤小豆末塗之立瘥鬼火丹從面上起上用灶下土雞子白調塗之立瘥雜證平和飲子小兒初生可日與之人參茯苓甘草炙升麻各一分上以水一白盞煎至一合半月以來時時與之乳母忌油膩滿月及百晬以來加之臨時冷加白朮熱加缺各半錢又方治孩子臍中不幹白礬一錢煅過龍骨一分上為細末入麝香少許每次使拭臍乾摻之用帕裹避風青木香散治孩子陰囊或如疝腫脹狐陰一支炙蒺藜炒地膚皮昆布枳殼炒槐子炒各一分上為末一歲二歲空心服米飲下一錢又方治孩子蛔蟲咬心痛面伏地臥口吐清水痰涎檳榔苦楝根鶴蝨炒各半兩上為末空心熱茶下一錢以意加減忌黏食杏仁丸治孩子或渴此是蛔蟲傷杏仁去皮膩粉各一分上為末每用唾丸空心米飲茶任下二丸又方治孩子赤遊腫或如丹煩渴渾身赤瘤壯熱緑豆粉鉛白霜上細研蕓薹汁調塗之又方取鉛霜法將鉛來於石上打令薄掘地作坑同鉛片大以杵搗坑實滿坑著醋以鉛蓋定經一宿去取霜如珠子大和藥使之如煩渴以後服解熱飲子又方麥門冬小蘆根竹葉乾葛搗末漏蘆犀角屑上水四合藥半兩煎一合無問食前後徐徐與之硝石散治孩子身上無故腫但覺肉色赤熱硝石大黃緑豆各等分上為末每用時隨腫大小取莙薘根研汁調塗腫上如有惡物即看有點子以膏貼之四面以散子熁之若無莙薘根即用雞子白或車前根葉亦得又方治孩子胎中受風長後或滿身痱癢如疥瘡或如飢飽癢瘡蔥白硝臭黃硫黃各等分上用油半兩燒令熱下少許蠟先剝蔥白三莖細切待油熱即潑蔥上細研續下硫黃臭黃硝更研之旋塗茴香散治孩子赤眼並胎熱及疳障多淚茴香冬青膽陰乾生甘草各等分上為細末每洗眼時取藥一分水一盞煎十沸後溫洗之或孩兒長大即藥並水引子方孩子用藥洗眼後可更服之知母黃芩青葙子地膚子秦皮車前子山梔子獨活各等分上藥以水五合煎二合去滓溫服忌食如常又方治孩子聤耳白礬半兩燒過龍骨鉛丹燒各一分麝香少許上為末以綿裹竹枝子探膿水以一小豆大藥敷之別以綿裹塞填之勿令見風又方治小兒聤耳石硫黃制上為細末以糝耳中日一夜一又方治孩子小便不通茯苓通草冬瓜子車前子各等分上以水四合藥半兩煎一合半作兩服忌油膩側柏散治孩子風熱側柏鬱金天麻酒浸一宿乾蠍天南星地黃去土子芩大黃各半兩上為末治風及驚溫酒下退熱每夜熱水下半錢柴胡飲子治小兒行遲小兒自小傷抱腳纖細無力行止不得或骨熱疳癆肌肉消瘦柴胡鱉甲米醋塗炙知母桔梗枳殼麩炒去瓤玄參升麻上藥等分並細銼每日煎時三歲以下取藥半兩水五合煎二合去滓分兩服空心食前後各一服忌毒物飲後用澡浴方澡浴方苦參茯苓皮蒼朮桑白皮白礬各半兩蔥白少許上藥銼細每浴時取一兩沸水二升浸藥後通溫與兒浴之避風於溫處妙又方治小兒數歲不能行取葬家未開戶盜其飯食來以哺之不過三日便起行勿令人知顱囟經二卷不著撰人姓名考歷代史志自唐藝文志已上皆不載其名至宋藝文志始有師巫顱囟經二卷近世別無傳本惟永樂大典內載有此書並載無名氏序文一篇稱王母金文黃帝得之升天祕藏金匱名曰內經百姓莫可見之後穆王賢士師巫於崆峒山得而釋之云云宋志所題師巫與序文相合殆即是本又宋史方技傳云錢乙始以顱囟經著名至京師視長公主女疾授翰林醫學按郡齊讀書志有錢氏小兒方八卷稱乙最工療嬰孺病蓋乙著名幼科其原實出於顱囟經矣此經疑唐末人所作其曰師巫蓋本於黃帝內傳而內經第七卷王冰注亦有師氏藏之一語故託名師巫以神其說耳其曰顱囟經者按說文顱頊顱首骨從頁盧聲囟頭會腦蓋也象形𦞤或從肉宰古文囟字唐韻囟先進切今作囟者俗體字也又說文云兒孺子也從兒象小兒頭囟未合此蓋以兒之初生顱囟未合證治不同故取以名其書歟首論脈候至數次論受病之由與療救之術皆深中肯綮又論火丹證治分別十五名目皆發前人之所未言其雜證所列亦多祕方要必別有所傳耳但沉薶已久今幸四庫全書館從永樂大典所載裒輯成書依宋志舊目析為二卷鱣多方托友亟録以歸藏諸書閣倘得好事者付梓以廣其傳則誠求保赤其利甚溥不獨為是書幸也乾隆五十三年三月海寧陳鱣識
